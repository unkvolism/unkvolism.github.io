<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>posts</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="topbar">
        <a href="index.html" class="site-name">Limbo</a>
        <nav>
            <a href="about.html">about</a>
            <a href="posts.html" class="active">posts</a>
        </nav>
    </div>

    <div class="page-body">
        <h1 class="page-title">posts</h1>

        <div class="posts-list" id="posts-container"></div>
    </div>

    <footer class="footer">
        <p>2026</p>
        <p class="footer-quote">"nel mezzo del cammin di nostra vita, mi ritrovai per una selva oscura"</p>
    </footer>

    <script>
        (async function () {
            const res = await fetch('posts.json?t=' + Date.now());
            const posts = await res.json();
            const container = document.getElementById('posts-container');

            posts.forEach(post => {
                const article = document.createElement('article');
                article.className = post.image ? 'post post-with-image' : 'post';

                let html = '';

                if (post.image) {
                    html += `<img class="post-image" src="${post.image}" alt="">`;
                    html += '<div>';
                }

                html += `<h2 class="post-title"><a href="post.html?slug=${post.slug}">${post.title}</a></h2>`;
                html += `<span class="post-date">${post.date}</span>`;
                html += `<p>${post.excerpt}</p>`;
                html += '<div class="post-tags">';
                post.tags.forEach(tag => {
                    html += `<span class="tag">${tag}</span>`;
                });
                html += '</div>';

                if (post.image) {
                    html += '</div>';
                }

                article.innerHTML = html;
                container.appendChild(article);
            });
        })();
    </script>

</body>
</html>
